
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday </title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
background:#050505;
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.stars{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.star{
position:absolute;
width:3px;
height:3px;
background:#D4AF37;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
50%{opacity:.2;transform:scale(0.5);}
}

.card{
position:relative;
width:90%;
max-width:700px;
padding:40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(212,175,55,.5);
border-radius:25px;
text-align:center;
box-shadow:0 0 40px rgba(212,175,55,.15);
z-index:2;
}

.gold-line{
width:120px;
height:2px;
background:#D4AF37;
margin:20px auto;
box-shadow:0 0 15px #D4AF37;
}

h1{
font-family:'Playfair Display',serif;
font-size:3rem;
color:#D4AF37;
text-shadow:0 0 20px rgba(212,175,55,.6);
}

.message{
margin-top:20px;
font-size:1.1rem;
line-height:1.8;
min-height:180px;
white-space:pre-line;
}

button{
margin-top:20px;
padding:12px 28px;
background:#D4AF37;
color:#111;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
font-size:16px;
transition:.4s;
animation:pulse 2s infinite;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #D4AF37;
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.08);
}
100%{
transform:scale(1);
}
}

.hidden{
display:none;
}

.cake{
font-size:90px;
animation:float 2s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.confetti{
position:absolute;
width:8px;
height:18px;
background:#D4AF37;
top:-20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

.footer{
margin-top:20px;
font-size:18px;
color:#D4AF37;
}

.glow{
animation:glow 2s infinite alternate,bounce 2.5s infinite;
}

@keyframes glow{
from{text-shadow:0 0 10px #D4AF37;}
to{text-shadow:0 0 25px #D4AF37,0 0 40px #D4AF37;}
}
@keyframes bounce{
0%,20%,50%,80%,100%{
transform:translateY(0);
}
40%{
transform:translateY(-12px);
}
60%{
transform:translateY(-6px);
}
}

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:heartFall linear forwards;
pointer-events:none;
}

@keyframes heartFall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

.floating{
position:absolute;
font-size:25px;
animation:floatEmoji 6s linear infinite;
opacity:.8;
}

@keyframes floatEmoji{
from{
transform:translateY(100vh);
opacity:0;
}
to{
transform:translateY(-100px);
opacity:1;
}
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="card">

<div id="start">
   <h1 class="glow">🐼</h1>

<div class="gold-line"></div>

<p style="margin-top:15px;font-size:18px;line-height:1.8;">
If you're avoiding your studies right now...
<br><br>
Good. smthg spcl hai😏
</p>

<button onclick="openCard()">Open kar😴</button>


</div>

<div id="birthday" class="hidden">

<div class="cake">🎂</div>

<h1>Happy Birthday Bachaaa😘</h1>

<div class="gold-line"></div>

<div class="message" id="typing"></div>

<div class="footer">
- Your Bachaaa😏❤️
</div>

</div>

</div>

<script>
const stars=document.getElementById('stars');

for(let i=0;i<120;i++){
let s=document.createElement('div');
s.className='star';
s.style.left=Math.random()*100+'%';
s.style.top=Math.random()*100+'%';
s.style.animationDelay=Math.random()*3+'s';
stars.appendChild(s);
}

function createConfetti(){
for(let i=0;i<120;i++){
let c=document.createElement('div');
c.className='confetti';
c.style.left=Math.random()*100+'vw';
c.style.animationDuration=(Math.random()*3+2)+'s';

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},5000);
}
}

function createHearts(){
for(let i=0;i<30;i++){
let h=document.createElement('div');
h.className='heart';
h.innerHTML='❤️';
h.style.left=Math.random()*100+'vw';
h.style.top='-20px';
h.style.animationDuration=(Math.random()*4+3)+'s';
document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},7000);
}
}

function floatingEmojis(){
const emojis=['🐼','🐼','🦉','🐼','😘','😘','🎂'];

setInterval(()=>{
let e=document.createElement('div');
e.className='floating';
e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
e.style.left=Math.random()*100+'vw';

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},6000);
},500);
}

function openCard(){

document.getElementById('start').classList.add('hidden');
document.getElementById('birthday').classList.remove('hidden');

createConfetti();
createHearts();
floatingEmojis();

const text =
`Areyy favourite night owl 🦉❤️

Sabse pehle!!Happy Birthday Bachaaa😘🐼

Aur thank you,meri bakwaas jhelne ke liye 😭😂

Soch,ek random family function mein mile the aur ab tu meri life ke sabse special logon mein se ek hai ❤️

Aur haan Kashishhhh jiii,thodi der aur enjoy kar lo mujhse badi hone ka privilege 😏😂

Bas khush reh,achha khana kha,mast neend maar,aur zyada stress mat le 😴

Aaj cake kaat lena!! kal paper phaad dena🤣🤣`;
let i=0;
const speed=40;

function typeWriter(){
if(i<text.length){
document.getElementById('typing').innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,speed);
}
}

typeWriter();
}

</script>

</body>
</html>
